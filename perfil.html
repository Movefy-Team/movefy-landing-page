<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movefy - Configuración de Perfil</title>
  <meta name="description" content="Configura tu perfil en Movefy.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body class="dashboard-page">

  <!-- Top Bar -->
  <header class="dash-topbar">
    <a href="index.html" class="dash-topbar-logo"><img src="img/logo-movefy.png" alt="Movefy Logo" class="logo-img"></a>
    <div class="dash-topbar-actions">
      <a href="notificaciones.html" class="dash-notif-btn" aria-label="Notificaciones">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="notif-badge">3</span>
      </a>
    </div>
  </header>

  <main class="perfil-main">
    <div class="perfil-header">
      <div class="perfil-avatar-large">
        YM
        <button class="edit-avatar-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
      </div>
      <h1>Yamil Montes</h1>
      <p>Pasajero Frecuente</p>
    </div>

    <form class="perfil-form" id="perfilForm">
      
      <!-- Datos Personales -->
      <div class="form-section">
        <h2>Datos Personales</h2>
        
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" value="Yamil Montes" required>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="tu_correo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" placeholder="+51 999 888 777" required>
        </div>
      </div>

      <!-- Seguridad y Emergencia -->
      <div class="form-section">
        <h2>Contactos de Emergencia</h2>
        <p class="section-desc">Se les notificará si activas el botón SOS.</p>
        
        <div class="form-group">
          <label for="contacto1">Contacto Principal (Nombre - Número)</label>
          <input type="text" id="contacto1" placeholder="Ej: Mamá - 999 888 777">
        </div>

        <div class="form-group">
          <label for="contacto2">Contacto Secundario (Nombre - Número)</label>
          <input type="text" id="contacto2" placeholder="Ej: Hermano - 987 654 321">
        </div>
      </div>

      <!-- Preferencias -->
      <div class="form-section">
        <h2>Preferencias de Viaje</h2>
        
        <div class="pref-toggle-group">
          <div class="pref-info">
            <label>Evitar rutas con reportes de peligro</label>
            <span>Desvía automáticamente rutas si hay incidentes recientes.</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="pref-peligro" checked>
            <div class="toggle-slider"></div>
          </div>
        </div>

        <div class="pref-toggle-group">
          <div class="pref-info">
            <label>Notificaciones Push</label>
            <span>Recibe alertas de seguridad y promociones.</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="pref-notif" checked>
            <div class="toggle-slider"></div>
          </div>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="save-profile-btn">Guardar Cambios</button>
      
      <!-- Logout -->
      <button type="button" class="logout-btn" onclick="window.location.href='login.html'">Cerrar Sesión</button>
      
    </form>
  </main>

  <!-- Bottom Nav -->
  <nav class="dash-bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="dashboard.html?section=destinos" class="bottom-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>Favoritos</span>
    </a>
    <a href="historial.html" class="bottom-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Historial</span>
    </a>
    <a href="perfil.html" class="bottom-nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </a>
  </nav>

  <script src="js/main.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>

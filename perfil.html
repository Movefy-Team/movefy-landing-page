<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movefy - Elige tu Perfil</title>
  <meta name="description" content="Selecciona tu perfil en Movefy: Pasajero o Conductor. Tu seguridad es nuestra prioridad.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="icon" type="image/png" href="img/logo-movefy.png">
</head>
<body class="perfil-page">

  <!-- ===== NAVBAR (Light) ===== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="img/logo-movefy.png" alt="Movefy Logo" class="logo-img">
    </a>
    <div class="navbar-actions">
      <button class="icon-btn" aria-label="Ayuda">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
      <button class="icon-btn" aria-label="Perfil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </nav>

  <!-- ===== CONTENT ===== -->
  <main class="perfil-content">
    <div class="perfil-header">
      <h1>Elige tu perfil</h1>
      <p>Selecciona cómo deseas moverte hoy</p>
    </div>

    <div class="perfil-cards">
      <!-- Pasajero Card -->
      <div class="perfil-card" id="cardPasajero" data-role="pasajero" tabindex="0">
        <div class="perfil-card-icon pasajero">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c0 1 2 3 6 3s6-2 6-3v-5"/>
          </svg>
        </div>
        <h3>Soy Pasajero</h3>
        <p>Busco rutas seguras y eficientes para mis trayectos diarios.</p>
      </div>

      <!-- Conductor Card -->
      <div class="perfil-card" id="cardConductor" data-role="conductor" tabindex="0">
        <div class="perfil-card-icon conductor">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 6v6"/><path d="M16 6v6"/>
            <rect x="4" y="2" width="16" height="16" rx="3"/>
            <path d="M4 12h16"/>
            <path d="M7 18v3"/><path d="M17 18v3"/>
            <circle cx="8" cy="8" r="1" fill="currentColor"/>
            <circle cx="16" cy="8" r="1" fill="currentColor"/>
          </svg>
        </div>
        <h3>Soy Conductor</h3>
        <p>Ofrezco viajes seguros y ayudo a optimizar el transporte urbano.</p>
      </div>
    </div>

    <!-- Safety Badge -->
    <div class="perfil-safety">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      Tu seguridad es nuestra prioridad
    </div>

    <!-- SafeRoute Logo -->
    <div class="perfil-saferoute">
      <span>S A F E R O U T E</span>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>

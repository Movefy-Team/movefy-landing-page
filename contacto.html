<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movefy - Habla con un Experto</title>
  <meta name="description" content="Crea tu cuenta en Movefy para acceder a rutas seguras en tiempo real.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body class="login-page">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="img/logo-movefy.png" alt="Movefy Logo" class="logo-img">
    </a>
    <div class="navbar-actions">
      <!-- Icons removed as requested -->
    </div>
  </nav>

  <!-- ===== PROFESSIONAL BACKGROUND ===== -->
  <div class="login-background" style="background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);">
    <!-- Abstract Tech Elements -->
    <div style="position: absolute; inset: 0; opacity: 0.05; background-image: radial-gradient(var(--primary-cyan) 1px, transparent 1px); background-size: 30px 30px;"></div>
    <div style="position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,170,0.15) 0%, transparent 70%); top: -200px; right: -100px; border-radius: 50%;"></div>
    <div style="position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); bottom: -300px; left: -200px; border-radius: 50%;"></div>
  </div>

  <!-- ===== REGISTER CONTENT ===== -->
  <main class="login-content">
    <div class="login-card">
      <!-- Shield Icon -->
      <div class="login-shield">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>

      <h1>Habla con un Experto</h1>
      <p class="login-subtitle">Déjanos tus datos y un asesor se comunicará contigo.</p>

      <!-- Register Form -->
      <form class="login-form" id="registerForm">
        <div class="input-group">
          <label for="fullname">Nombre completo</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="fullname" name="fullname" placeholder="Ej. Juan Pérez" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
          </div>
        </div>

        <div class="input-group">
          <label for="telefono">Teléfono personal</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </span>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej. 987654321" required>
          </div>
        </div>

        <div class="input-group">
          <label for="mensaje">¿En qué podemos ayudarte?</label>
          <div class="input-wrapper" style="height: auto; align-items: flex-start; padding: 12px;">
            <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos sobre las necesidades de tu empresa o flota..." style="width: 100%; border: none; outline: none; resize: vertical; min-height: 80px; font-family: inherit; font-size: 14px; background: transparent; color: var(--text-dark);" required></textarea>
          </div>
        </div>

        <button type="submit" class="login-submit" id="submitBtn">
          Enviar Mensaje
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </form>

      <div class="login-register">
        <a href="index.html">Volver al inicio</a>
      </div>
    </div>
  </main>

  <!-- Bottom Badges Removed -->

  <!-- Status Pill -->
  <div class="status-pill">
    <span class="status-dot"></span>
    Sistemas Operativos
  </div>

  <script src="js/main.js"></script>
  <!-- Simple JS for the form submission -->
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'Enviando...';
      btn.style.background = '#059669';
      
      setTimeout(() => {
        alert('¡Mensaje enviado con éxito! Un experto de Movefy se pondrá en contacto contigo pronto.');
        window.location.href = 'index.html';
      }, 1500);
    });
  </script>
</body>
</html>
